<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" font-family="ui-monospace,Menlo,Consolas,monospace">
  <rect width="640" height="340" rx="10" fill="#0a0f1f"/>
  <!-- browser chrome -->
  <rect width="640" height="34" rx="10" fill="#11192c"/>
  <circle cx="18" cy="17" r="5" fill="#ff5f56"/><circle cx="36" cy="17" r="5" fill="#ffbd2e"/><circle cx="54" cy="17" r="5" fill="#27c93f"/>
  <rect x="80" y="8" width="540" height="18" rx="9" fill="#0b1426"/>
  <text x="92" y="21" fill="#5b7a99" font-size="11">127.0.0.1:8080  · localhost only</text>
  <!-- app header -->
  <text x="20" y="62" fill="#22d3ee" font-size="18" font-weight="700">◆ Sentinel · local AI agent</text>
  <line x1="0" y1="76" x2="640" y2="76" stroke="#18324a"/>
  <!-- chat -->
  <text x="20" y="104" fill="#34d399" font-size="13">▸ show me a cve about android</text>
  <g font-size="12.5" fill="#cfe8ff">
    <text x="20" y="128">[cybersecurity agent · tier medium]</text>
    <text x="20" y="146">[retrieval agent] topic=cve</text>
    <text x="20" y="164">=== CVE-2024-0044 ===</text>
    <text x="20" y="182">Android run-as privilege escalation via crafted package name …</text>
  </g>
  <text x="20" y="212" fill="#34d399" font-size="13">▸ write a C function to reverse a string</text>
  <g font-size="12.5" fill="#cfe8ff">
    <text x="20" y="236">[coding agent · tier heavy]</text>
    <text x="20" y="254">compiled OK, running:  reversed: ytirucesrebyc</text>
  </g>
  <!-- input bar -->
  <rect x="16" y="294" width="500" height="30" rx="8" fill="#0b1426" stroke="#18324a"/>
  <text x="30" y="313" fill="#5b7a99" font-size="12.5">ask Sentinel…</text>
  <rect x="524" y="294" width="100" height="30" rx="8" fill="#22d3ee"/>
  <text x="574" y="314" fill="#04121c" font-size="13" font-weight="700" text-anchor="middle">Send</text>
</svg>
